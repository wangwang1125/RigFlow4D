### train_video2pose_v3.yaml ###
name: "Video2Pose v3 training"

runtime:
  device: "cuda"
  seed: 42
  debug: false

output:
  checkpoint_root: "./checkpoints/video2pose_v3"

experiment:
  exp: "exp_v3_base"

model:
  target: "models.v3.video2pose.model.RefGuidedVideo2PoseModel"

  params:
    q_dim: 256
    num_layers: 12
    num_heads: 8
    ref_layers: 4
    img_dim: 1024
    num_joints: 150

    temporal_window: 2

    use_graph_ref_inner: true
    use_graph_temporal_inner: true
    use_joint_embed: true

    dropout: 0.1

data:
  bvh_dir: "datasets/zoo1030/bvh"
  split_json: "datasets/zoo1030/selected_test_split1010.json"
  mmap: true
  cache_scale: true
  limit_species_debug: []
  train_memory_pkl_path: datasets/zoo1030/cache/species_fps_memory_yAll/fps_select_by_rot_32.pkl
  test_memory_pkl_path: datasets/zoo1030/cache/species_fps_memory_yAll/fps_select_by_rot_32.pkl

train:
  epochs: 500
  batch_size: 1
  num_workers_train: 4
  seq_len: 24

  lr: 0.0001
  weight_decay: 0.0
  loss_type: "l2"
  vel_loss_type: "l2"
  vel_weight: 0.0

  grad_accum_steps: 4
  grad_clip_norm: 1.0
  test_every: 1
  vis_every: 5
  max_ckpt: 5
  pretrain_ckpt: null

eval:
  batch_size: 1
  num_workers: 2
  preload_all: false
  split_groups: ["seen", "rare", "unseen"]
  best_metric_split: "seen"
  best_metric_name: "mpjpe"
